# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

# ===== DATOS CRUDOS =====
pacientes_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/pacientes.csv
  load_args:
    encoding: utf-8

consultas_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/consultas.csv
  load_args:
    encoding: utf-8

examenes_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/examenes.csv
  load_args:
    encoding: utf-8

medicamentos_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/medicamentos.csv
  load_args:
    encoding: utf-8

# ===== DATOS LIMPIOS =====
pacientes_cleaned:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/pacientes_cleaned.csv
  load_args:
    index_col: False
  save_args:
    index: False

consultas_cleaned:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/consultas_cleaned.csv
  save_args:
    index: False

examenes_cleaned:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/examenes_cleaned.csv
  save_args:
    index: False

medicamentos_cleaned:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/medicamentos_cleaned.csv
  save_args:
    index: False